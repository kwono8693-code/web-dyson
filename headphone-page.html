<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>headphone-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/product-main.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="common-frame">
        <div class="banner">
            <div class="para-banner">
                <h1>처음 경험하는 오디오 스펙트럼</h1>
                <p>
                    나만의 컬러웨이, 나만의 온트랙 <br>
                    커스터마이징 가능한 이어쿠션+캡 컬렉션으로 <br>
                    세상에 하나 뿐인 나만의 헤드폰을 만들어보세요.
                </p>
            </div>
            <video src="./img/video-headphone.mp4" autoplay muted loop style="object-fit: contain;"></video>
        </div>
        <nav class="category-tabs">
            <button class="tab active" data-filter="headphone">온트랙 노이즈 캔슬링 헤드폰</button>
            <button class="tab" data-filter="adapters">온트랙 이어쿠션, 캡 어댑터</button>
        </nav>
        <div class="info-box2">
            
        </div>
        <div class="filter-bar">
            <span id="product-count">0개 제품</span>
            <div class="sort-container">
                <button class="sort-button" id="sort-btn">
                    <span id="current-sort">정렬기준</span>
                    <span class="arrow-icon"></span>
                </button>
                <ul class="sort-list" id="sort-list">
                    <li data-sort="new">최신순</li>
                    <li data-sort="popular">인기순</li>
                    <li data-sort="price-low">낮은가격순</li>
                    <li data-sort="price-high">높은가격순</li>
                </ul>
            </div>

        </div>


        <section class="product-grid" id="product-container"></section>
    </div>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/headphone-page.js"></script> 

</body>
</html>
