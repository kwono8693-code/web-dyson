<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="기존 다이슨 홈페이지를 리디자인한 웹페이지, 웹디자이너 포트폴리오 용도로 사용합니다.">
    <meta name="keywords" content="웹디자이너 포트폴리오, 웹퍼블리셔 포트폴리오, 다이슨 리디자인 브랜드 홈페이지, 반응형 다이슨 브랜드 웹사이트 디자인(포트폴리오)">
    <meta name="robots" content="index, follow">
    <link rel="icon" sizes="32x32" type="image/png" href="./img/favicon.png">

    <!-- 오픈 그래프 설정(카카오톡, 페이스북과 같은 곳에 링크로 공유될 때 보여지는 카드 정보 내용) -->

    <meta property="og:title" content="다이슨 브랜드 리디자인-취업용 포트폴리오 웹사이트">
    <meta property="og:description" content="취업 용도의 웹디자이너 포트폴리오 웹사이트입니다. 다이슨 브랜드를 리디자인하여 반응형으로 디자인 및 html, css, javascript 언어를 사용하여 직접 구현하였습니다. 메인 페이지, 제품 페이지, 고객지원 페이지, 마이페이지 등 모든 페이지를 만들었습니다.">
    <meta property="og:url" content="/">
    <meta property="og:image" content="./img/card-image.jpg">
    <meta property="og:type" content="website">
    <title>product-cleander-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./js/cleaner-page.js"></script>
    <script src="./js/product-detail.js"></script>
    <script src="./js/heart.js"></script>
    <link rel="stylesheet" href="./style/product-detail.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="product-detail-container">
        <div class="common-frame">
            <div class="detail-wrap">
                <section class="detail-left-area" id="detail-image">
                    </section>
    
                <section class="detail-right-area" id="detail-info">
                    </section>
            </div>
            <div class="benefit-wrap">
                <ul class="benefit-card">
                    <li>
                        <h4>카드사 최대 12개월 무이자 할부</h4>
                        <p>롯데/ 하나/ 삼성 카드</p>
                    </li>
                    <li>
                        <h4>오전 10시 이전 주문시 당일 출고</h4>
                        <p>일부 도서 산간지방 제외/주말, 공휴일 제외</p>
                    </li>
                    <li>
                        <h4>보증기간 내 무상 A/S</h4>
                        <p>헤어케어, 무선 청소기, 공기청정기, 헤드폰 2년 / 조명 5년</p>
                    </li>
                    <li>
                        <h4>리뷰 이벤트 혜택</h4>
                        <p>참여자 전원 선물 증정</p>
                    </li>
                </ul>
            </div>
             <section class="detail-content">
                <figure>
                    <img src="./img/detail-hair.jpg" alt="헤어 제품 상세">
                </figure>
            </section>
        </div>

    </main>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
