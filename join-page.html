<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>join-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/join.css">
</head>
<body>
    <div id="site-header"></div>

    <main>
        <div class="common-frame">
            <div class="box-join">
                <div class="join-container">
                    <div class="join-box">
                        <h1 class="page-title">회원가입</h1>
                        <p class="required-notice">필수 입력 사항*</p>
                        <form class="join-form" id="joinForm">
                            <div class="input-row">
                                <label>휴대폰 번호*</label>
                                <div class="input-group-with-btn">
                                    <select class="phone-prefix" id="phone1">
                                        <option value="010">010</option>
                                    </select>
                                    <span class="dash">-</span>
                                    <input type="text" id="phone2" maxlength="4">
                                    <span class="dash">-</span>
                                    <input type="text" id="phone3" maxlength="4">
                                    <button type="button" class="btn-outline">인증번호받기</button>
                                </div>
                            </div>

                            <div class="input-row">
                                <label>이름*</label>
                                <div>
                                    <input type="text" id="userName" class="underlined-input">
                                </div>
                            </div>

                            <div class="input-row">
                                <label>이메일 주소 <br> (다이슨 아이디)*</label>
                                <div class="input-group-with-btn">
                                    <input type="email" id="userEmail" class="underlined-input">
                                    <button type="button" class="btn-outline">이메일 확인</button>
                                </div>
                            </div>

                            <div class="input-row">
                                <label>비밀번호*</label>
                                <div>
                                    <input type="password" id="userPw" class="underlined-input">
                                </div>
                            </div>
                            <div class="input-row">
                                <label>비밀번호 확인*</label>
                                <div>
                                    <input  type="password" id="userPwConfirm" class="underlined-input">
                                </div>
                            </div>

                            <div class="input-row last-input">
                                <label>주소</label>
                                <div class="address">
                                    <div class="input-group-with-btn">
                                        <input type="text" id="postCode" class="gray-input" placeholder="우편번호" readonly>
                                        <button type="button" class="btn-outline">주소검색</button>
                                    </div>
                                    <input type="text" id="addr1" class="underlined-input" placeholder="기본주소">
                                    <input type="text" id="addr2" class="underlined-input" placeholder="나머지 주소">
                                </div>
                            </div>

                            <div class="agreement-area">
                                <label class="check-item all-check">
                                    <input type="checkbox" id="check-all">
                                    <span>모두 확인, 동의 합니다.</span>
                                </label>
                                <div class="sub-checks">
                                    <label class="check-item">
                                        <input type="checkbox" class="single-check required-check">
                                        <span>웹사이트 사용 약관에 대한 동의<span class="red">(필수)</span></span>
                                    </label>
                                    <label class="check-item">
                                        <input type="checkbox" class="single-check required-check">
                                        <span>다이슨 코리아가 다이슨 글로벌 개인정보처리방침 및 다이슨코리아의 개인정보처리방침에 따른 서비스 및 지원 등을 제공하기 위하여 개인정보 이용 및 수집에 동의합니다.<span class="red">(필수)</span></span>
                                    </label>
                                    <label class="check-item">
                                        <input type="checkbox" class="single-check required-check">
                                        <span>개인정보의 제 3자 제공(당사 계열사 및 국외 포함) 및 처리위탁에 동의합니다.<span class="red">(필수)</span></span>
                                    </label>
                                    <label class="check-item">
                                        <input type="checkbox" class="single-check">
                                        <span>다이슨의 신제품 소식 및 특별 이벤트 초대 등의 혜택을 위한 마케팅 정보 수신에 동의합니다.<span class="gray">(선택)</span></span>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn-submit-join">가입하기</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <script>
            const checkAll = document.getElementById('check-all');
            const singleChecks = document.querySelectorAll('.single-check');
            const joinForm = document.getElementById('joinForm');

            // 1. 전체 동의 기능
            checkAll.addEventListener('change', (e) => {
                singleChecks.forEach(check => {
                    check.checked = e.target.checked;
                });
            });

            singleChecks.forEach(check => {
                check.addEventListener('change', () => {
                    const checkedCount = document.querySelectorAll('.single-check:checked').length;
                    checkAll.checked = (checkedCount === singleChecks.length);
                });
            });

            // 2. 가입하기 버튼 클릭 시 유효성 검사 (JS)
            joinForm.addEventListener('submit', (e) => {
                e.preventDefault(); // 폼 제출 막기

                // 필수 텍스트 필드 값 가져오기
                const phone2 = document.getElementById('phone2').value.trim();
                const phone3 = document.getElementById('phone3').value.trim();
                const name = document.getElementById('userName').value.trim();
                const email = document.getElementById('userEmail').value.trim();
                const pw = document.getElementById('userPw').value.trim();
                const pwConfirm = document.getElementById('userPwConfirm').value.trim();

                // [체크 1] 빈 칸 확인
                if (!phone2 || !phone3 || !name || !email || !pw || !pwConfirm) {
                    alert('필수 입력 사항(*)을 모두 입력해 주세요.');
                    return;
                }

                // [체크 2] 비밀번호 일치 확인
                if (pw !== pwConfirm) {
                    alert('비밀번호가 일치하지 않습니다. 다시 확인해 주세요.');
                    document.getElementById('userPwConfirm').focus();
                    return;
                }

                // [체크 3] 필수 약관 동의 확인
                const requiredCheckboxes = document.querySelectorAll('.required-check');
                let isAllRequiredChecked = true;
                
                requiredCheckboxes.forEach(cb => {
                    if (!cb.checked) isAllRequiredChecked = false;
                });

                if (!isAllRequiredChecked) {
                    alert('필수 약관에 모두 동의하셔야 가입이 가능합니다.');
                    return;
                }

                // 모든 검사 통과 시
                alert('회원가입이 완료되었습니다!');
                // joinForm.submit(); // 실제 전송 시 주석 해제
            });
        </script>
    </main>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
