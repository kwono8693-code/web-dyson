<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>accessories-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/accessories.css">
</head>
<body>
    <div id="site-header"></div>

    <main>
        <div class="common-frame">
            <div class="acc-wrap">
                <section class="accessory-visual">
                    <h1>다이슨의 정품 액세서리 및 부품을 만나 보세요</h1>
                    <div class="visual-img-box">
                        <img src="./img/accessory-banner.jpg" alt="다이슨 정품 부품 모음">
                    </div>
                </section>
    
                <section class="accessory-quick-link">
                    <h3 class="section-title">바로 가기</h3>
                    <div class="quick-grid">
                        <a href="#" class="quick-item">
                            <div class="img-box"><img src="./img/acc-direct-cleaner.jpg" alt="청소기 배터리"></div>
                            <p>청소기 배터리</p>
                        </a>
                        <a href="#" class="quick-item">
                            <div class="img-box"><img src="./img/acc-direct-cleaner-tool.jpg" alt="청소기 툴"></div>
                            <p>청소기 툴</p>
                        </a>
                        <a href="#" class="quick-item">
                            <div class="img-box"><img src="./img/acc-direct-air-filter.jpg" alt="공기청정기 필터"></div>
                            <p>공기청정기 필터</p>
                        </a>
                        <a href="#" class="quick-item">
                            <div class="img-box"><img src="./img/acc-direct-hair-tool.jpg" alt="헤어케어 액세서리"></div>
                            <p>헤어케어<br> 액세서리 및 툴</p>
                        </a>
                    </div>
                </section>
    
                <section class="accessory-category">
                    <h3 class="section-title">제품으로 액세서리 및 부품 찾기</h3>
                    <p class="section-desc">보유하신 제품과 호환되는 액세서리 및 부품을 찾아보세요.</p>
                    <div class="category-grid">
                        <a href="#" class="category-item">
                            <div class="img-box"><img src="./img/acc-find-cleaner.jpg" alt="청소기"></div>
                            <p>청소기</p>
                        </a>
                        <a href="#" class="category-item">
                            <div class="img-box"><img src="./img/acc-find-hair.jpg" alt="헤어케어"></div>
                            <p>헤어케어</p>
                        </a>
                        <a href="#" class="category-item">
                            <div class="img-box"><img src="./img/acc-find-air.jpg" alt="공기청정기"></div>
                            <p>공기청정기 및 선풍기</p>
                        </a>
                        <a href="#" class="category-item">
                            <div class="img-box"><img src="./img/acc-find-headphone.jpg" alt="헤드폰"></div>
                            <p>헤드폰</p>
                        </a>
                    </div>
                </section>
    
                <section class="accessory-promo">
                    <div class="promo-box">
                        <figure>
                            <img src="./img/acc-icon-foot.png" alt="악세서리 하단 이미지">
                        </figure>
                        <h4>현재 할인 중인 액세서리 및 부품을 만나 보세요!</h4>
                        <a href="#" class="acc-btn-more">더 알아보기</a>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
