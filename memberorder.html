<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memberorder-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/memberorder.css">
</head>
<body>
    <div id="site-header"></div>

    <main>
        <div class="common-frame">
            <section class="order-check">
                <div class="check-header">
                    <h1>나의 주문 보기</h1>
                    <p>주문 상세 내역을 확인할 수 있도록 정확한 주문 번호, 이메일 주소 및 배송지 연락처를 입력해 주세요.<br>
                    배송이 시작되면 택배사에서 안내 메시지가 발송됩니다. 자세한 배송 상태는 택배사에서 보내드리는 메시지를 통해 확인해 주시기 바랍니다.</p>
                </div>

                <form class="check-form">
                    <div class="input-group">
                        <label for="order-num">주문 번호 *</label>
                        <input type="text" id="order-num" required>
                    </div>

                    <div class="input-group">
                        <label for="user-email">이메일 주소 *</label>
                        <input type="email" id="user-email" required>
                    </div>

                    <div class="input-group">
                        <label for="user-tel">결제자 연락처 *</label>
                        <span class="sub-label">주문자 번호를 입력해 주세요.</span>
                        <input type="tel" id="user-tel" value="010-" required>
                    </div>

                    <button type="submit" class="btn-submit">주문 보기</button>
                </form>
            </section>
        </div>
    </main>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
