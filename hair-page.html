<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="기존 다이슨 홈페이지를 리디자인한 웹페이지, 웹디자이너 포트폴리오 용도로 사용합니다.">
    <meta name="keywords" content="웹디자이너 포트폴리오, 웹퍼블리셔 포트폴리오, 다이슨 리디자인 브랜드 홈페이지, 반응형 다이슨 브랜드 웹사이트 디자인(포트폴리오)">
    <meta name="robots" content="index, follow">
    <link rel="icon" sizes="32x32" type="image/png" href="./img/favicon.png">

    <!-- 오픈 그래프 설정(카카오톡, 페이스북과 같은 곳에 링크로 공유될 때 보여지는 카드 정보 내용) -->

    <meta property="og:title" content="다이슨 브랜드 리디자인-취업용 포트폴리오 웹사이트">
    <meta property="og:description" content="취업 용도의 웹디자이너 포트폴리오 웹사이트입니다. 다이슨 브랜드를 리디자인하여 반응형으로 디자인 및 html, css, javascript 언어를 사용하여 직접 구현하였습니다. 메인 페이지, 제품 페이지, 고객지원 페이지, 마이페이지 등 모든 페이지를 만들었습니다.">
    <meta property="og:url" content="/">
    <meta property="og:image" content="./img/card-image.jpg">
    <meta property="og:type" content="website">
    <title>hair-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">


    <link rel="stylesheet" href="./style/product-main.css">
</head>
<body>
    <div id="site-header"></div>
    <div class="common-frame">
        <div class="banner">
            <div class="para-banner">
                <h1>정밀한 공기 제어로 완성되는 스타일</h1>
                <p>
                    정밀한 공기  흐름과 온도 제어 기술이 모발 손상을 줄이며 <br>
                    스타일을 손쉽게 완성합니다.
                </p>
            </div>
            <video src="./img/video-hair.mp4" autoplay muted loop></video>
        </div>
        <nav class="category-tabs">
            <button class="tab" data-filter="styler">스타일러</button>
            <button class="tab" data-filter="dryer">드라이어</button>
            <button class="tab" data-filter="straitner">스트레이트너</button>
            <button class="tab" data-filter="essentials">헤어 에센셜 케어</button>
        </nav>

        <div class="filter-bar">
            <span id="product-count">0개 제품</span>
            <div class="sort-container">
                <button class="sort-button" id="sort-btn">
                    <span id="current-sort">정렬기준</span>
                    <span class="arrow-icon"></span>
                </button>
                <ul class="sort-list" id="sort-list">
                    <li data-sort="new">최신순</li>
                    <li data-sort="popular">인기순</li>
                    <li data-sort="price-low">낮은가격순</li>
                    <li data-sort="price-high">높은가격순</li>
                </ul>
            </div>

        </div>


        <section class="product-grid" id="product-container"></section>
    </div>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/hair-page.js"></script>
    <script>
        let categoryTab = getUrlParam("cate") || "styler"
        const cateTabs = document.querySelectorAll(".category-tabs>.tab")
        cateTabs.forEach(tab=>{
            if(tab.getAttribute("data-filter") === categoryTab){
                tab.classList.add("active")
            }
        })
        renderProducts(categoryTab)


    </script>
</body>
</html>
