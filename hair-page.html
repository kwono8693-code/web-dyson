<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hair-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">


    <link rel="stylesheet" href="./style/product-main.css">
</head>
<body>
    <div id="site-header"></div>
    <div class="common-frame">
        <div class="banner">
            <div class="para-banner">
                <h1>정밀한 공기 제어로 완성되는 스타일</h1>
                <p>
                    정밀한 공기  흐름과 온도 제어 기술이 모발 손상을 줄이며 <br>
                    스타일을 손쉽게 완성합니다.
                </p>
            </div>
            <video src="./img/video-hair.mp4" autoplay muted loop></video>
        </div>
        <nav class="category-tabs">
            <button class="tab active" data-filter="styler">스타일러</button>
            <button class="tab" data-filter="dryer">드라이어</button>
            <button class="tab" data-filter="straitner">스트레이트너</button>
            <button class="tab" data-filter="essentials">헤어 에센셜 케어</button>
        </nav>

        <div class="filter-bar">
            <span id="product-count">0개 제품</span>
            <div class="sort-container">
                <button class="sort-button" id="sort-btn">
                    <span id="current-sort">정렬기준</span>
                    <span class="arrow-icon"></span>
                </button>
                <ul class="sort-list" id="sort-list">
                    <li data-sort="new">최신순</li>
                    <li data-sort="popular">인기순</li>
                    <li data-sort="price-low">낮은가격순</li>
                    <li data-sort="price-high">높은가격순</li>
                </ul>
            </div>

        </div>


        <section class="product-grid" id="product-container"></section>
    </div>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/hair-page.js"></script>
    <script>
        // URL 파라미터에서 category 받아서 탭 활성화
        const category = getUrlParam('cate');
        if (category) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.filter === category) {
                    tab.classList.add('active');
                }
            });
            // 해당 카테고리 제품 렌더링
            renderProducts(category);
        }
    </script>
</body>
</html>
