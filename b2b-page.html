<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="기존 다이슨 홈페이지를 리디자인한 웹페이지, 웹디자이너 포트폴리오 용도로 사용합니다.">
    <meta name="keywords" content="웹디자이너 포트폴리오, 웹퍼블리셔 포트폴리오, 다이슨 리디자인 브랜드 홈페이지, 반응형 다이슨 브랜드 웹사이트 디자인(포트폴리오)">
    <meta name="robots" content="index, follow">
    <link rel="icon" sizes="32x32" type="image/png" href="./img/favicon.png">

    <!-- 오픈 그래프 설정(카카오톡, 페이스북과 같은 곳에 링크로 공유될 때 보여지는 카드 정보 내용) -->

    <meta property="og:title" content="다이슨 브랜드 리디자인-취업용 포트폴리오 웹사이트">
    <meta property="og:description" content="취업 용도의 웹디자이너 포트폴리오 웹사이트입니다. 다이슨 브랜드를 리디자인하여 반응형으로 디자인 및 html, css, javascript 언어를 사용하여 직접 구현하였습니다. 메인 페이지, 제품 페이지, 고객지원 페이지, 마이페이지 등 모든 페이지를 만들었습니다.">
    <meta property="og:url" content="/">
    <meta property="og:image" content="./img/card-image.jpg">
    <meta property="og:type" content="website">

    
    <title>b2b-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="./style/b2b.css">
</head>
<body>
    
    <div id="site-header"></div>

    <main>
        <div class="common-frame">
            <div class="b2b-wrap">
    
                <section class="b2b-hero">
    
                </section>

                <nav class="b2b-category">
                    <div class="swiper cate-slider3">
                        <ul class="swiper-wrapper category-list">
                            <li class="swiper-slide">
                                <img src="./img/b2b-hair.jpg" alt=""><span>헤어케어</span>
                            </li>
                            <li class="swiper-slide">
                                <img src="./img/b2b-handdryer.jpg" alt=""><span>핸드 드라이어</span>
                            </li>
                            <li class="swiper-slide">
                                <img src="./img/b2b-cleaner.jpg" alt=""><span>청소기</span>
                            </li>
                            <li class="swiper-slide">
                                <img src="./img/b2b-air.jpg" alt=""><span>공기청정기</span>
                            </li>
                            <li class="swiper-slide">
                                <img src="./img/b2b-light.jpg" alt=""><span>조명</span>
                            </li>
                        </ul>
                    </div>
    
                    <script>
                        const cateSlider = new Swiper(".cate-slider3",{
                            slidesPerView: 2.5,
                            spaceBetween: 14,
                            breakpoints: {
                                400:{
                                    slidesPerView: 2.5,
                                    spaceBetween: 14,
                                },
                                768:{
                                    slidesPerView: 5,
                                    spaceBetween: 18,
                                },
                                1440:{
                                    slidesPerView: 5,
                                    spaceBetween: 20,
                                },
                            }
                        })
                    </script>
                </nav>

                <section class="b2b-intro">
                    <h1>더 나은 업무 환경과 쾌적한 공간을 위한 설계</h1>
                    <p>다이슨의 모든 제품은 엄격한 연구, 사용자 테스트와 과학적이고 인체공학적인 개발 단계를 거쳐 설계 및 생산됩니다.<br>
                    다이슨의 최신 기술로 개선된 작업 공간을 만나보세요.</p>
                </section>
    
                <section class="b2b-benefits">
                    <h1>다이슨 기업 고객 혜택</h1>
                    <div class="benefit-grid">
                        <div class="benefit-card">
                            <img src="./img/b2b-qa.svg" alt="">
                            <span>구매 문의</span>
                        </div>
                        <div class="benefit-card">
                            <img src="./img/b2b-service.svg" alt="">
                            <span>기업 고객 전용 서포트 서비스</span>
                        </div>
                        <div class="benefit-card">
                            <img src="./img/b2b-call.svg" alt="">
                            <span>고객 센터 운영</span>
                        </div>
                        <div class="benefit-card">
                            <img src="./img/b2b-repair.svg" alt="">
                            <span>보증 기간 무상 A/S</span>
                        </div>
                    </div>
                </section>
            </div>

        </div>
    </main>


    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>

</body>
</html>
