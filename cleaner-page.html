<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cleaner-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/product-main.css">
</head>
<body>
    <div id="site-header"></div>

    <div class="common-frame">
        <div class="banner">
            <div class="para-banner">
                <h1>AI로 얼룩을 감지하여 꼼꼼하게 맞춤 청소</h1>
                <p>
                    실시간 셀프 클린 롤러로 깔끔한 마무리까지런칭 기간에만 <br>
                    만날 수 있는 특별한 혜택을 만나보세요.
                </p>
            </div>
            <video src="./img/video-cleaner.mp4" autoplay muted loop></video>
        </div>
        <nav class="category-tabs">
            <button class="tab" data-filter="aicleaner">로봇 청소기</button>
            <button class="tab" data-filter="watercleaner">물청소기</button>
            <button class="tab" data-filter="vacuumcleaner">진공청소기</button>
            <button class="tab" data-filter="vacuumwatercleaner">진공+물청소기</button>
        </nav>

        <div class="filter-bar">
            <span id="product-count">0개 제품</span>
            <div class="sort-container">
                <button class="sort-button" id="sort-btn">
                    <span id="current-sort">정렬기준</span>
                    <span class="arrow-icon"></span>
                </button>
                <ul class="sort-list" id="sort-list">
                    <li data-sort="new">최신순</li>
                    <li data-sort="popular">인기순</li>
                    <li data-sort="price-low">낮은가격순</li>
                    <li data-sort="price-high">높은가격순</li>
                </ul>
            </div>

        </div>


        <section class="product-grid" id="product-container"></section>
    </div>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/cleaner-page.js"></script>
    <script>
        let categoryTab = getUrlParam("cate") || "aicleaner"
        const cateTabs = document.querySelectorAll(".category-tabs>.tab")
        cateTabs.forEach(tab=>{
            if(tab.getAttribute("data-filter") === categoryTab){
                tab.classList.add("active")
            }
        })
        renderProducts(categoryTab)


    </script>
</body>
</html>
