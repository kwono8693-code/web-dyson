<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="기존 다이슨 홈페이지를 리디자인한 웹페이지, 웹디자이너 포트폴리오 용도로 사용합니다.">
    <meta name="keywords" content="웹디자이너 포트폴리오, 웹퍼블리셔 포트폴리오, 다이슨 리디자인 브랜드 홈페이지, 반응형 다이슨 브랜드 웹사이트 디자인(포트폴리오)">
    <meta name="robots" content="index, follow">
    <link rel="icon" sizes="32x32" type="image/png" href="./img/favicon.png">

    <!-- 오픈 그래프 설정(카카오톡, 페이스북과 같은 곳에 링크로 공유될 때 보여지는 카드 정보 내용) -->

    <meta property="og:title" content="다이슨 브랜드 리디자인-취업용 포트폴리오 웹사이트">
    <meta property="og:description" content="취업 용도의 웹디자이너 포트폴리오 웹사이트입니다. 다이슨 브랜드를 리디자인하여 반응형으로 디자인 및 html, css, javascript 언어를 사용하여 직접 구현하였습니다. 메인 페이지, 제품 페이지, 고객지원 페이지, 마이페이지 등 모든 페이지를 만들었습니다.">
    <meta property="og:url" content="/">
    <meta property="og:image" content="./img/card-image.jpg">
    <meta property="og:type" content="website">
    <title>findpw-page</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/findpw.css">

</head>
<body>
    <div id="site-header"></div>


    <main>
        <div class="common-frame">
            <div class="box-pw">
                <h1 class="page-title">비밀번호 찾기</h1>
                <div class="find-pw-container">
                    
                    <div class="find-pw-box">
                        <form class="find-pw-form">
                            <p class="form-instruction">비밀번호 재설정 안내 받을 방법을 선택하세요.</p>
                            
                            <div class="method-selection">
                                <label class="radio-item">
                                    <input type="radio" name="reset-method" value="sms" checked>
                                    <span class="radio-text">문자 메시지(SNS)</span>
                                </label>
                                <label class="radio-item">
                                    <input type="radio" name="reset-method" value="email">
                                    <span class="radio-text">이메일 주소</span>
                                </label>
                            </div>
                            
                            <p class="method-description">비밀번호 재설정 안내 이메일을 보내드리겠습니다.</p>
                            
                            <div class="input-group">
                                <input type="text" placeholder="휴대폰번호" id="target-input">
                            </div>
                            
                            <button type="submit" class="btn-submit">문자 받기</button>
                        </form>
                        
                        <ul class="footer-links">
                            <li><a href="./findpw-page.html">비밀번호 찾기</a></li>
                            <li><a href="./noMemberorder-page.html">비회원 주문조회</a></li>
                            <li><a href="./join-page.html">회원가입</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <script>
            document.querySelectorAll('input[name="reset-method"]').forEach((radio) => {
            radio.addEventListener('change', (e) => {
                const description = document.querySelector('.method-description');
                const input = document.getElementById('target-input');
                const button = document.querySelector('.btn-submit');

                if (e.target.value === 'sms') {
                    description.textContent = '비밀번호 재설정 안내 문자를 보내드리겠습니다.';
                    input.placeholder = '휴대폰번호';
                    button.textContent = '문자 받기';
                } else {
                    description.textContent = '비밀번호 재설정 안내 이메일을 보내드리겠습니다.';
                    input.placeholder = '이메일 주소';
                    button.textContent = '이메일 받기';
                }
            });
        });
        </script>
    </main>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/url-params.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
