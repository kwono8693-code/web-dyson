<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mypage</title>
    <link rel="stylesheet" href="./style/font.css">
    <link rel="stylesheet" href="./style/dyson.css">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/system.css">
    <link rel="stylesheet" href="./style/common.css">
    <link rel="stylesheet" href="./style/header.css">
    <link rel="stylesheet" href="./style/footer.css">

    <link rel="stylesheet" href="./style/mypage.css">
</head>
<body>
    <div id="site-header"></div>
    
    <main>
        <div class="common-frame">
            <section class="mypage-welcome">
                <h1>ㅇㅇㅇ님 반갑습니다.</h1>
            </section>

            <section class="mypage-summary">
                <div class="summary-left">
                    <p>ㅇㅇㅇ님의 등급은 <span class="grade">WELCOME</span> 입니다.</p>
                    <button type="button" class="btn-grade-benefit">등급혜택 보기</button>
                </div>
                <div class="summary-right">
                    <div class="summary-item">
                        <a href="#">
                            <img src="./img/icon-coupon.svg" alt="쿠폰 아이콘">
                            <span>쿠폰 <strong>1</strong></span>
                        </a>
                    </div>
                    <div class="summary-item">
                        <a href="#">
                            <img src="./img/icon-review.svg" alt="리뷰 아이콘">
                            <span>구매 후기 <strong>0</strong></span>
                        </a>
                    </div>
                </div>
            </section>

            <section class="mypage-order">
                <div class="section-header">
                    <h3>최근 주문 내역 <span>최근 3개월간 구매하신 내역입니다.</span></h3>
                    <a href="#" class="btn-more">전체주문조회 &gt;</a>
                </div>

                <div class="order-tabs">
                    <button type="button" class="tab-btn active">일반택배</button>
                    <button type="button" class="tab-btn">당일퀵배송</button>
                    <button type="button" class="tab-btn">취소/교환/반품</button>
                </div>

                <div class="order-process">
                    <div class="process-item">
                        <span class="count">0</span>
                        <p class="status-text">입금/결제</p>
                    </div>
                    <div class="process-arrow"></div>
                    
                    <div class="process-item">
                        <span class="count">0</span>
                        <p class="status-text">배송중</p>
                    </div>
                    <div class="process-arrow"></div>
                    
                    <div class="process-item">
                        <span class="count">0</span>
                        <p class="status-text">배송완료</p>
                    </div>
                    <div class="process-arrow"></div>
                    
                    <div class="process-item">
                        <span class="count">0</span>
                        <p class="status-text">구매확정</p>
                    </div>
                    <div class="process-arrow"></div>
                    
                    <div class="process-item">
                        <span class="count">0</span>
                        <p class="status-text">환불/교환</p>
                    </div>
                </div>

                <div class="empty-data">
                    내역이 없습니다.
                </div>
            </section>

            <section class="mypage-like">
                <div class="section-header">
                    <h3>MY LIKE ITEMS</h3>
                    <a href="#" class="btn-more">더보기</a>
                </div>
                <div class="empty-data">
                    MY LIKE ITEMS가 없습니다.
                </div>
            </section>
        </div>
    </main>

    <script>
        const initMyPageTabs = () => {
        const tabButtons = document.querySelectorAll('.tab-btn');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                
                button.classList.add('active');
                
            });
        });
    };
    document.addEventListener('DOMContentLoaded', initMyPageTabs);
    </script>

    <div id="site-footer"></div> 

    <script src="./js/include.js"></script>
    <script src="./js/header.js"></script>
</body>
</html>
